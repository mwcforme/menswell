    <!--
      PHI guard: strip query string + hash from any /book/* URL BEFORE
      GTM/GA4 load, so document.location.href (read by GA4 Enhanced
      Measurement events like scroll/click) never carries PII/PHI.
      Must run synchronously before the GTM snippet below.
    -->

      (function () {
        try {
          if (location.pathname.indexOf('/book/') === 0 && (location.search || location.hash)) {
            history.replaceState(null, '', location.pathname);
          }
        } catch (e) { /* no-op */ }
      })();
    </script>
